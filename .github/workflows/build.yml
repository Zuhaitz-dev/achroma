name: Build and Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ xvfb \
            qt6-base-dev qt6-webengine-dev \
            libutf8proc-dev liblz4-dev

      - name: Build qtermwidget6 from source
        run: |
          git clone --depth 1 https://github.com/lxqt/qtermwidget.git /tmp/qtermwidget
          sed -i 's/set(QT_MINIMUM_VERSION "6.6.0")/set(QT_MINIMUM_VERSION "6.4.0")/' /tmp/qtermwidget/CMakeLists.txt
          sed -i '/find_package(Qt6LinguistTools/d' /tmp/qtermwidget/CMakeLists.txt
          sed -i '/find_package(lxqt2-build-tools/d' /tmp/qtermwidget/CMakeLists.txt
          sed -i '/include(LXQt/d' /tmp/qtermwidget/CMakeLists.txt
          sed -i '/^lxqt_translate_ts/,/^)/d' /tmp/qtermwidget/CMakeLists.txt
          sed -i '/^lxqt_create_pkgconfig_file/,/^)/d' /tmp/qtermwidget/CMakeLists.txt
          sed -i 's/\${SRCS} \${MOCS} \${UI_SRCS} \${QTERMWIDGET_QM}/\${SRCS} \${MOCS} \${UI_SRCS}/' /tmp/qtermwidget/CMakeLists.txt
          cmake -B /tmp/qtermwidget/build -S /tmp/qtermwidget \
            -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -DQTERMWIDGET_USE_UTEMPTER=OFF
          cmake --build /tmp/qtermwidget/build -j$(nproc)
          sudo cmake --install /tmp/qtermwidget/build

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test (offscreen)
        run: QT_QPA_PLATFORM=offscreen ctest --test-dir build --output-on-failure
        timeout-minutes: 3

      - name: Test (Xvfb)
        run: xvfb-run -a ctest --test-dir build --output-on-failure
        timeout-minutes: 3

  build-fedora:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          dnf install -y \
            cmake gcc-c++ git xorg-x11-server-Xvfb \
            qt6-qtbase-devel qt6-qtwebengine-devel \
            qtermwidget-devel \
            make

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: xvfb-run -a ctest --test-dir build --output-on-failure
        timeout-minutes: 3

  sanitize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ xvfb \
            qt6-base-dev qt6-webengine-dev \
            libutf8proc-dev liblz4-dev

      - name: Build qtermwidget6 from source
        run: |
          git clone --depth 1 https://github.com/lxqt/qtermwidget.git /tmp/qtermwidget
          sed -i 's/set(QT_MINIMUM_VERSION "6.6.0")/set(QT_MINIMUM_VERSION "6.4.0")/' /tmp/qtermwidget/CMakeLists.txt
          sed -i '/find_package(Qt6LinguistTools/d' /tmp/qtermwidget/CMakeLists.txt
          sed -i '/find_package(lxqt2-build-tools/d' /tmp/qtermwidget/CMakeLists.txt
          sed -i '/include(LXQt/d' /tmp/qtermwidget/CMakeLists.txt
          sed -i '/^lxqt_translate_ts/,/^)/d' /tmp/qtermwidget/CMakeLists.txt
          sed -i '/^lxqt_create_pkgconfig_file/,/^)/d' /tmp/qtermwidget/CMakeLists.txt
          sed -i 's/\${SRCS} \${MOCS} \${UI_SRCS} \${QTERMWIDGET_QM}/\${SRCS} \${MOCS} \${UI_SRCS}/' /tmp/qtermwidget/CMakeLists.txt
          cmake -B /tmp/qtermwidget/build -S /tmp/qtermwidget \
            -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -DQTERMWIDGET_USE_UTEMPTER=OFF
          cmake --build /tmp/qtermwidget/build -j$(nproc)
          sudo cmake --install /tmp/qtermwidget/build

      - name: Configure (ASan+UBSan)
        run: cmake -B build/asan -DCMAKE_BUILD_TYPE=Debug -DENABLE_ASAN=ON -DENABLE_UBSAN=ON -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build/asan -j$(nproc)

      - name: Test
        run: QT_QPA_PLATFORM=offscreen ctest --test-dir build/asan --output-on-failure
        timeout-minutes: 5
